# Reusable Rust check suite. One job per check (never bundled) so each shows up
# as its own status. Called by ci.yml (PRs, develop, main) and release.yml (tags).
#
# Toolchain: every job relies on rust-toolchain.toml — `rustup show` installs the
# pinned version + components on the runner before any cargo command.
name: rust-checks

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: build (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest      # amd64
          - runner: ubuntu-24.04-arm   # native arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: nextest
        run: cargo nextest run --workspace --all-features --profile ci
      - name: doctests
        # nextest does not run doctests — run them separately.
        run: cargo test --workspace --all-features --doc

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  machete:
    name: unused-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  guardrails:
    name: guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash ci/guardrails.sh

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Non-blocking for now. Flip to the spec §16.2 per-crate gates
    # (core >=95%, server >=85%, overall >=90%) once real code lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: collect coverage
        run: cargo llvm-cov nextest --workspace --all-features --lcov --output-path lcov.info
      - name: upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # TODO(WS-I): conformance vs emulator (hermetic) — required for merge once the
  #   harness exists. See conformance/.
  # TODO(WS-F): stripe-go + stripe-node signature-verifier jobs.
  # TODO(WS-G): Playwright checkout E2E (chromium).
  # TODO(WS-D/J): fixture-schema validation + coverage-matrix freshness.
