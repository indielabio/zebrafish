# Reusable Rust check suite. One job per check (never bundled) so each shows up
# as its own status. Called by ci.yml (PRs, develop, main) and release.yml (tags).
#
# Toolchain: every job relies on rust-toolchain.toml — `rustup show` installs the
# pinned version + components on the runner before any cargo command.
name: rust-checks

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: build (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest      # amd64
          - runner: ubuntu-24.04-arm   # native arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: nextest
        run: cargo nextest run --workspace --all-features --profile ci
      - name: doctests
        # nextest does not run doctests — run them separately.
        run: cargo test --workspace --all-features --doc

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  machete:
    name: unused-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  guardrails:
    name: guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash ci/guardrails.sh

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Non-blocking for now. Flip to the spec §16.2 per-crate gates
    # (core >=95%, server >=85%, overall >=90%) once real code lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: collect coverage
        run: cargo llvm-cov nextest --workspace --all-features --lcov --output-path lcov.info
      - name: upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage-matrix:
    name: coverage-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: docs/COVERAGE.md is fresh
        # The doc is generated from the resource registry (spec §12); fail if a
        # registry change landed without regenerating it.
        run: |
          cargo run -p gen-coverage
          git diff --exit-code docs/COVERAGE.md

  # Webhook signatures verified by the REAL Stripe SDK verifiers (spec §8,
  # §16.3 — release blocker). Each job boots the actual binary, registers an
  # endpoint, triggers customer.created, and runs the SDK's constructEvent.
  sdk-verify-node:
    name: sdk-verify (stripe-node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p zebrafish-server --bin zebrafish --locked
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: ci/sdk-verifiers/node
      - run: node verify.mjs
        working-directory: ci/sdk-verifiers/node
        env:
          ZEBRAFISH_BIN: ${{ github.workspace }}/target/debug/zebrafish

  sdk-verify-go:
    name: sdk-verify (stripe-go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p zebrafish-server --bin zebrafish --locked
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: ci/sdk-verifiers/go/go.sum
      - run: go run .
        working-directory: ci/sdk-verifiers/go
        env:
          ZEBRAFISH_BIN: ${{ github.workspace }}/target/debug/zebrafish

  # TODO(WS-I): conformance vs emulator (hermetic) — required for merge once the
  #   harness exists. See conformance/.
  # TODO(WS-G): Playwright checkout E2E (chromium).
  # TODO(WS-D/J): fixture-schema validation.
