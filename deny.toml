# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# Run locally with `cargo deny check`.

[graph]
all-features = true

[advisories]
# Fail on any security advisory or unmaintained crate in our dependency tree.
version = 2
yanked = "deny"

[licenses]
version = 2
# zebrafish is dual MIT / Apache-2.0; only permit licenses compatible with that.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Warn on duplicate versions of the same crate; deny known-wildcard hazards.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
